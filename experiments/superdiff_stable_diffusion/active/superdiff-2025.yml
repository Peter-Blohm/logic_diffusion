name: superdiff-2025
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch
  - torchvision
  - pytorch-cuda=12.1
  # Data/plot stack
  - numpy=1.26.*
  - pandas=2.2.2
  - matplotlib-base=3.8.4
  - pyarrow<21               # needed for datasets==2.11.0
  - fsspec>=2023.6.0
  - packaging>=23.1
  - ffmpeg
  - pip:
      # SuperDiff + ImageReward compatible stack
      - image-reward
      - transformers==4.27.4
      - timm==0.6.13
      - diffusers==0.16.0
      - accelerate==0.16.0
      - datasets==2.11.0
      - huggingface_hub==0.14.1
      # CLIP
      - git+https://github.com/openai/CLIP.git
      # small utils
      - safetensors
      - jaxtyping
      - einops
      - ftfy
      - regex
      - wandb
